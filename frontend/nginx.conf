# Static serve for the SPA + same-origin /api proxy to the FastAPI service.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Content-Security-Policy: a backstop for the raw-HTML deck.gl tooltip (the values it
  # interpolates are also escaped in code). Each allowance is required by a real dependency:
  #   script-src 'wasm-unsafe-eval'  - MapLibre GL uses WASM; Vite bundles are self-hosted (no inline JS)
  #   worker-src/child-src blob:     - MapLibre + deck.gl spawn web workers from blob: URLs
  #   style-src 'unsafe-inline' + fonts.googleapis.com - Tailwind + inline style attrs + Google Fonts CSS
  #   font-src fonts.gstatic.com     - Google Fonts files
  #   img-src data: blob: cartocdn   - data: favicon, canvas blobs, Carto basemap sprites/tiles
  #   connect-src cartocdn           - Carto style.json + vector tiles (same-origin /api covered by 'self')
  # NOTE: if VITE_SENTRY_DSN / VITE_ANALYTICS_URL point at an external origin, add it to
  # connect-src. VERIFY in a real browser (basemap must render) before trusting this in prod.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; child-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.basemaps.cartocdn.com; connect-src 'self' https://*.basemaps.cartocdn.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Serve pre-compressed .gz built by the Dockerfile (no per-request CPU on the 28 MB
  # metrics.json); fall back to on-the-fly gzip for everything else.
  gzip_static on;
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types application/json application/geo+json application/javascript text/css image/svg+xml;

  # Hashed Vite assets are content-addressed -> cache forever.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Data payloads are regenerated each build (not hashed) -> cache but always revalidate.
  location ~* \.(json|geojson)$ {
    add_header Cache-Control "public, max-age=3600, must-revalidate";
    try_files $uri =404;
  }

  # Dynamic API (per-ZIP drill-down, rankings, compare). Same-origin so the SPA needs no
  # VITE_API_BASE; the upstream name matches the compose service.
  location /api/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # SPA history fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
