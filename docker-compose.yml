# Local production-parity stack: API + nginx-served SPA (same-origin /api).
#   make data        # produce metrics.parquet + frontend/public/{metrics.json,zcta.geojson}
#   docker compose up --build
#   open http://localhost:8080
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      # Must include the web origin below so the browser's CORS check passes.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Empty -> SPA calls same-origin /api, which nginx proxies to the api service.
        VITE_API_BASE: ""
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
