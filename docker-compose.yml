# Local production-parity stack: API + nginx-served SPA (same-origin /api).
#   make data        # produce metrics.parquet + frontend/public/{metrics.json,zcta_overview.geojson,zcta.pmtiles}
#   docker compose up --build
#   open http://localhost:8080
# For a single-VPS TLS deploy, layer the prod override (adds Caddy auto-HTTPS):
#   cp .env.prod.example .env && edit, then
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      # Must include the web origin below so the browser's CORS check passes.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
    ports:
      # Bind only on loopback. In production Caddy reaches the service over the internal
      # compose network; the API should not be directly exposed to the internet.
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    # The whole metrics table is read into memory (pandas) once at startup; cap so a leak can't
    # take down the host. /api/health drives the Dockerfile HEALTHCHECK.
    mem_limit: 1g
    cpus: 1.5
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Empty -> SPA calls same-origin /api, which nginx proxies to the api service.
        VITE_API_BASE: ""
    ports:
      # Local preview only. The production overlay exposes Caddy on 80/443 and keeps this
      # nginx service private except for loopback.
      - "127.0.0.1:8080:80"
    depends_on:
      - api
    restart: unless-stopped
    mem_limit: 256m
    cpus: 1.0
    healthcheck:
      # busybox wget ships in nginx:alpine; fails the container if nginx stops serving.
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
