name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: pipeline + backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"  # match the prod runtime (backend/Dockerfile python:3.12-slim)
          cache: pip
      - run: pip install -r requirements.txt
      # NOTE: the data stages need API keys + multi-GB downloads, so CI has no
      # data/processed/metrics.parquet. Tests that require it `skip` (see pytest.mark.skipif),
      # so this run guards imports, contracts, and the harnesses' code paths. Data-level
      # acceptance is gated locally/pre-deploy via `make acceptance` on a real build.
      - run: python -m pytest tests -q

  frontend:
    name: frontend (typecheck + unit + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Merge-gating, network-free: fail if the Netlify CSP/security headers drift from nginx.conf.
      # (The full browser-render CSP check below stays non-gating because it hits the Carto CDN.)
      - run: node scripts/verify-csp.mjs --static
      # The build needs the gitignored data payloads; stub empties so `vite build` succeeds and we
      # still catch TS/bundler regressions. Names track the live payload contract (map_frame +
      # subscores + overview geojson). (Real payloads ship via `make data`.)
      - run: |
          [ -f public/map_frame.json ] || echo '{"n":0,"zcta5":[]}' > public/map_frame.json
          [ -f public/subscores.json ] || echo '{"zcta5":[]}' > public/subscores.json
          [ -f public/zcta_overview.geojson ] || echo '{"type":"FeatureCollection","features":[]}' > public/zcta_overview.geojson
      - run: npm run build

  e2e:
    name: frontend (playwright smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Seed a tiny deterministic fixture so the app renders without a full build pipeline.
      - run: node e2e/make-fixture.mjs
      - run: npm run test:e2e

  csp:
    name: frontend (csp policy)
    runs-on: ubuntu-latest
    # Loads the real Carto basemap over the network, so a CDN hiccup must not gate a merge;
    # the authoritative run is `make verify-csp` locally. It still surfaces CSP regressions.
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: node e2e/make-fixture.mjs
      - run: npm run build
      - run: node scripts/verify-csp.mjs
